<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin — Kivu Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .focus\:border-slate:focus { border-color:#334155 }
    </style>
</head>
<body class="bg-gray-100 min-h-screen w-full flex justify-center font-sans">
<div class="w-full max-w-md min-h-screen bg-white shadow-2xl flex flex-col">

    <div id="auth-gate" class="flex-1 flex flex-col items-center justify-center p-8">
        <div class="w-16 h-16 bg-slate-800 rounded-2xl flex items-center justify-center mb-4 shadow-lg">
            <i class="fas fa-lock text-white text-2xl"></i>
        </div>
        <h2 class="font-bold text-gray-900 text-xl mb-1">Admin Panel</h2>
        <p class="text-xs text-gray-400 mb-6">Kivu Academy</p>
        <input id="admin-password" type="password" placeholder="Enter admin password"
               class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm outline-none mb-3 transition">
        <p id="auth-error" class="hidden text-red-500 text-xs mb-3 font-medium"></p>
        <button onclick="checkPassword()"
                class="w-full bg-slate-800 text-white font-bold py-3 rounded-xl active:scale-95 transition text-sm">
            Enter
        </button>
    </div>

    <div id="admin-panel" class="hidden flex-1 flex flex-col">
        <div class="bg-gradient-to-r from-slate-800 to-gray-900 text-white pt-10 pb-4 px-4 shrink-0">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="font-bold text-lg">Academy Admin</h1>
                    <p class="text-[10px] text-gray-400">Manage books & dictionary</p>
                </div>
                <button onclick="logout()" class="bg-white/10 text-white text-xs font-bold px-3 py-1.5 rounded-full border border-white/20">
                    Logout
                </button>
            </div>
        </div>

        <div class="flex border-b border-gray-100 bg-white shrink-0">
            <button onclick="switchTab('books')" id="atab-books"
                    class="flex-1 py-3 text-xs font-bold border-b-2 border-slate-800 text-slate-800">
                📚 Books
            </button>
            <button onclick="switchTab('dictionary')" id="atab-dictionary"
                    class="flex-1 py-3 text-xs font-bold border-b-2 border-transparent text-gray-400">
                📖 Dictionary
            </button>
        </div>

        <div class="flex-1 overflow-y-auto p-4">

            <div id="admin-view-books">
                <div class="bg-gray-50 border border-gray-100 rounded-xl p-4 mb-4">
                    <h3 class="font-bold text-sm text-gray-800 mb-3">Add New Book</h3>
                    <div class="space-y-2">
                        <input id="b-title" type="text" placeholder="Title *"
                               class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm outline-none transition">
                        <select id="b-category" class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm outline-none transition bg-white text-gray-700">
                            <option>Mining & Geology</option>
                            <option>Practical Skills</option>
                            <option>IT & Code</option>
                            <option>Local Laws</option>
                            <option>Languages</option>
                        </select>
                        <div class="flex gap-2">
                            <select id="b-language" class="flex-1 border border-gray-200 rounded-xl px-3 py-2.5 text-sm outline-none transition bg-white text-gray-700">
                                <option value="EN">English</option>
                                <option value="RW">Kinyarwanda</option>
                                <option value="FR">French</option>
                                <option value="ZH">Chinese</option>
                            </select>
                            <select id="b-format" class="flex-1 border border-gray-200 rounded-xl px-3 py-2.5 text-sm outline-none transition bg-white text-gray-700">
                                <option value="pdf">PDF</option>
                                <option value="epub">EPUB</option>
                                <option value="text">Text</option>
                            </select>
                        </div>
                        <input id="b-size" type="text" placeholder="File size (e.g. 1.2 MB)"
                               class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm outline-none transition">
                        <input id="b-url" type="url" placeholder="Cloudflare R2 URL *"
                               class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm outline-none transition">
                        <textarea id="b-desc" rows="2" placeholder="Description (optional)"
                                  class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm outline-none resize-none transition"></textarea>
                    </div>
                    <p id="b-msg" class="hidden text-xs font-medium text-center mt-2"></p>
                    <button onclick="window._addBook()"
                            class="w-full mt-3 bg-slate-800 text-white font-bold py-2.5 rounded-xl text-sm active:scale-95 transition">
                        Add Book
                    </button>
                </div>
                <h3 class="font-bold text-xs text-gray-500 uppercase tracking-widest mb-2">All Books</h3>
                <div id="admin-books-list"></div>
            </div>

            <div id="admin-view-dictionary" class="hidden">
                <div class="bg-gray-50 border border-gray-100 rounded-xl p-4 mb-4">
                    <h3 class="font-bold text-sm text-gray-800 mb-3">Add Dictionary Entry</h3>
                    <div class="space-y-2">
                        <input id="d-word" type="text" placeholder="Word *"
                               class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm outline-none transition">
                        <div class="flex gap-2">
                            <select id="d-from" class="flex-1 border border-gray-200 rounded-xl px-3 py-2.5 text-sm outline-none transition bg-white text-gray-700">
                                <option>Kinyarwanda</option>
                                <option>English</option>
                                <option>Chinese</option>
                            </select>
                            <select id="d-to" class="flex-1 border border-gray-200 rounded-xl px-3 py-2.5 text-sm outline-none transition bg-white text-gray-700">
                                <option>English</option>
                                <option>Kinyarwanda</option>
                                <option>Chinese</option>
                            </select>
                        </div>
                        <input id="d-pos" type="text" placeholder="Part of speech (e.g. Noun)"
                               class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm outline-none transition">
                        <textarea id="d-def" rows="2" placeholder="Definition *"
                                  class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm outline-none resize-none transition"></textarea>
                        <input id="d-example" type="text" placeholder="Example sentence (optional)"
                               class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm outline-none transition">
                    </div>
                    <p id="d-msg" class="hidden text-xs font-medium text-center mt-2"></p>
                    <button onclick="window._addEntry()"
                            class="w-full mt-3 bg-slate-800 text-white font-bold py-2.5 rounded-xl text-sm active:scale-95 transition">
                        Add Entry
                    </button>
                </div>
                <h3 class="font-bold text-xs text-gray-500 uppercase tracking-widest mb-2">Recent Entries</h3>
                <div id="admin-dict-list"></div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { loadAdminBooks, addBook, deleteBook, loadAdminDictionary, addEntry, deleteEntry } from '/js/academy/admin.js';

    const ADMIN_PASSWORD = 'kivu2024';

    window.checkPassword = () => {
        const pw = document.getElementById('admin-password').value;
        if (pw === ADMIN_PASSWORD) {
            document.getElementById('auth-gate').classList.add('hidden');
            document.getElementById('admin-panel').classList.remove('hidden');
            loadAdminBooks();
        } else {
            const err = document.getElementById('auth-error');
            err.textContent = 'Incorrect password.';
            err.classList.remove('hidden');
        }
    };

    window.logout = () => {
        document.getElementById('auth-gate').classList.remove('hidden');
        document.getElementById('admin-panel').classList.add('hidden');
        document.getElementById('admin-password').value = '';
    };

    window.switchTab = (tab) => {
        ['books','dictionary'].forEach(t => {
            document.getElementById('admin-view-' + t).classList.toggle('hidden', t !== tab);
            const btn = document.getElementById('atab-' + t);
            btn.classList.toggle('border-slate-800', t === tab);
            btn.classList.toggle('text-slate-800',   t === tab);
            btn.classList.toggle('border-transparent', t !== tab);
            btn.classList.toggle('text-gray-400',    t !== tab);
        });
        if (tab === 'dictionary') loadAdminDictionary();
        if (tab === 'books')      loadAdminBooks();
    };

    window._addBook     = addBook;
    window._deleteBook  = deleteBook;
    window._addEntry    = addEntry;
    window._deleteEntry = deleteEntry;

    document.getElementById('admin-password').addEventListener('keydown', e => {
        if (e.key === 'Enter') window.checkPassword();
    });
</script>
</body>
</html>
