<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Funeral Services — Kivu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar{display:none} .no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
    </style>
</head>
<body class="bg-gray-100 h-screen w-full flex justify-center overflow-hidden font-sans">
<div class="w-full max-w-md h-full bg-white shadow-2xl flex flex-col relative">

    <!-- Header -->
    <div class="text-white pt-10 pb-4 px-4 shrink-0" style="background:#374151">
        <div class="flex items-center justify-between mb-3">
            <button onclick="window.location.href='/'" class="w-8 h-8 rounded-full bg-white/30 flex items-center justify-center">
                <i class="fas fa-arrow-left text-sm"></i>
            </button>
            <div>
                <h1 class="font-black text-xl leading-none">🕊️ Funeral Services</h1>
                <p class="text-[11px] text-white/70 mt-0.5">Compassionate support across Kigali</p>
            </div>
            <button onclick="window._openMap()" class="bg-white/20 text-white text-xs font-bold px-3 py-1.5 rounded-full flex items-center gap-1.5">
                <i class="fas fa-map-marker-alt"></i> Map
            </button>
        </div>
        <div class="relative">
            <i class="fas fa-search absolute left-3 top-3 text-white/60 text-sm"></i>
            <input id="search-input" type="text" placeholder="Search funeral services..."
                   class="w-full bg-white/20 text-white placeholder-white/60 rounded-xl pl-9 pr-4 py-2.5 text-sm outline-none">
        </div>
    </div>

    <!-- Category filter -->
    <div class="flex gap-2 px-4 py-2 overflow-x-auto no-scrollbar shrink-0 border-b border-gray-100">
        <button onclick="window._setCategory('', this)" class="shrink-0 text-white px-3 py-1.5 rounded-full text-[11px] font-bold" style="background:#374151">All</button>
        <button onclick="window._setCategory('Coffins', this)" class="shrink-0 bg-gray-50 border border-gray-200 text-gray-600 px-3 py-1.5 rounded-full text-[11px] font-bold">⚰️ Coffins</button>
        <button onclick="window._setCategory('Gravestones & Memorials', this)" class="shrink-0 bg-gray-50 border border-gray-200 text-gray-600 px-3 py-1.5 rounded-full text-[11px] font-bold">🪨 Memorials</button>
        <button onclick="window._setCategory('Funeral Flowers', this)" class="shrink-0 bg-gray-50 border border-gray-200 text-gray-600 px-3 py-1.5 rounded-full text-[11px] font-bold">🌹 Flowers</button>
        <button onclick="window._setCategory('Funeral Transport', this)" class="shrink-0 bg-gray-50 border border-gray-200 text-gray-600 px-3 py-1.5 rounded-full text-[11px] font-bold">🚐 Transport</button>
        <button onclick="window._setCategory('Mortuary and Body Storage', this)" class="shrink-0 bg-gray-50 border border-gray-200 text-gray-600 px-3 py-1.5 rounded-full text-[11px] font-bold">🏥 Mortuary</button>
        <button onclick="window._setCategory('Cremation Services', this)" class="shrink-0 bg-gray-50 border border-gray-200 text-gray-600 px-3 py-1.5 rounded-full text-[11px] font-bold">🔥 Cremation</button>
        <button onclick="window._setCategory('Grief Counseling', this)" class="shrink-0 bg-gray-50 border border-gray-200 text-gray-600 px-3 py-1.5 rounded-full text-[11px] font-bold">🤝 Grief Support</button>
        <button onclick="window._setCategory('Funeral Planning', this)" class="shrink-0 bg-gray-50 border border-gray-200 text-gray-600 px-3 py-1.5 rounded-full text-[11px] font-bold">📋 Planning</button>
        <button onclick="window._setCategory('Music and Choir Services', this)" class="shrink-0 bg-gray-50 border border-gray-200 text-gray-600 px-3 py-1.5 rounded-full text-[11px] font-bold">🎵 Music</button>
        <button onclick="window._setCategory('Catering Services', this)" class="shrink-0 bg-gray-50 border border-gray-200 text-gray-600 px-3 py-1.5 rounded-full text-[11px] font-bold">🍽️ Catering</button>
    </div>

    <!-- Secondary filters -->
    <div class="flex gap-2 px-4 py-2 overflow-x-auto no-scrollbar shrink-0">
        <button onclick="window._toggleOpen(this)" class="shrink-0 bg-gray-50 border border-gray-200 text-gray-600 px-3 py-1.5 rounded-full text-[11px] font-bold">🟢 Open Now</button>
        <button onclick="window._toggleRating(this)" class="shrink-0 bg-gray-50 border border-gray-200 text-gray-600 px-3 py-1.5 rounded-full text-[11px] font-bold">⭐ Top Rated</button>
        <button onclick="window._toggleTag('24h', this)" class="shrink-0 bg-gray-50 border border-gray-200 text-gray-600 px-3 py-1.5 rounded-full text-[11px] font-bold">🕐 24h Service</button>
        <button onclick="window._toggleTag('repatriation', this)" class="shrink-0 bg-gray-50 border border-gray-200 text-gray-600 px-3 py-1.5 rounded-full text-[11px] font-bold">✈️ Repatriation</button>
        <button onclick="window._toggleTag('insurance', this)" class="shrink-0 bg-gray-50 border border-gray-200 text-gray-600 px-3 py-1.5 rounded-full text-[11px] font-bold">🛡️ Insurance</button>
        <button onclick="window._clearFilters()" class="shrink-0 bg-gray-100 text-gray-500 px-3 py-1.5 rounded-full text-[11px] font-bold">✕ Clear</button>
    </div>

    <!-- Feed -->
    <div class="flex-1 overflow-y-auto no-scrollbar px-4 pt-3 pb-24">
        <div id="funeral-feed" class="grid grid-cols-2 gap-3"></div>
        <div id="pagination"></div>
    </div>

    <!-- FAB: List My Service -->
    <a href="/funeral/merchant"
       class="absolute right-4 text-white rounded-full flex items-center gap-2 px-5 h-14 shadow-xl active:scale-95 transition z-20"
       style="bottom: max(1.5rem, env(safe-area-inset-bottom)); background:#374151">
        <i class="fas fa-dove text-base"></i>
        <span class="text-sm font-bold">List My Service</span>
    </a>
</div>

<!-- Map overlay -->
<div id="map-overlay" class="hidden absolute inset-0 z-[100] flex flex-col" style="position:fixed">
    <div class="bg-white w-full h-[95%] mt-auto rounded-t-3xl flex flex-col overflow-hidden shadow-2xl">
        <div class="flex justify-between items-center px-4 pt-4 pb-2 shrink-0">
            <div>
                <h3 id="map-title" class="font-bold text-gray-900">Funeral Services Map</h3>
                <p id="map-count" class="text-[10px] text-gray-400 mt-0.5">Loading...</p>
            </div>
            <button onclick="window._closeMap()" class="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center">
                <i class="fas fa-times text-gray-600 text-sm"></i>
            </button>
        </div>
        <!-- Map search -->
        <div class="px-4 pb-2 shrink-0">
            <div class="relative">
                <i class="fas fa-search absolute left-3 top-2.5 text-gray-400 text-xs"></i>
                <input id="map-search" type="text" placeholder="Search provider or location..."
                       class="w-full bg-gray-100 rounded-xl pl-8 pr-4 py-2 text-xs outline-none"
                       oninput="window._mapSearch(this.value)">
            </div>
        </div>
        <div id="leaflet-map" class="flex-1"></div>
    </div>
</div>

<script type="module">
    import { renderFeed, openProvider } from '/js/funeral/feed.js';
    import { openMap, closeMap, mapSearch } from '/js/funeral/map.js';

    let state = { open: false, rating: false, tags: [], category: '', search: '' };
    renderFeed(1, {});

    window._openProvider = openProvider;
    window._changePage   = (p) => renderFeed(p, state);
    window._openMap      = openMap;
    window._closeMap     = closeMap;
    window._mapSearch    = (q) => mapSearch(q);

    let _activeCatBtn = document.querySelector('[onclick*="_setCategory(\'\'"]');
    window._setCategory = (cat, btn) => {
        if (_activeCatBtn) { _activeCatBtn.style.background = ''; _activeCatBtn.style.color = ''; }
        state.category = cat;
        btn.style.background = '#374151'; btn.style.color = '#fff';
        _activeCatBtn = btn;
        renderFeed(1, state);
    };

    window._toggleOpen = (btn) => {
        state.open = !state.open;
        btn.classList.toggle('text-white', state.open);
        btn.style.background = state.open ? '#374151' : '';
        renderFeed(1, state);
    };
    window._toggleRating = (btn) => {
        state.rating = !state.rating;
        btn.classList.toggle('text-white', state.rating);
        btn.style.background = state.rating ? '#374151' : '';
        renderFeed(1, state);
    };
    window._toggleTag = (tag, btn) => {
        const idx = state.tags.indexOf(tag);
        if (idx === -1) { state.tags.push(tag); btn.style.background = '#374151'; btn.classList.add('text-white'); }
        else { state.tags.splice(idx, 1); btn.style.background = ''; btn.classList.remove('text-white'); }
        renderFeed(1, state);
    };
    window._clearFilters = () => {
        state = { open: false, rating: false, tags: [], category: '', search: '' };
        document.getElementById('search-input').value = '';
        if (_activeCatBtn) { _activeCatBtn.style.background = ''; _activeCatBtn.style.color = ''; }
        renderFeed(1, {});
    };

    document.getElementById('search-input').addEventListener('input', (e) => {
        clearTimeout(window._sd);
        window._sd = setTimeout(() => {
            state.search = e.target.value.trim();
            renderFeed(1, state);
        }, 350);
    });
</script>
</body>
</html>
