<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin — Kivu Food</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .bg-coral { background-color:#FF7F50 }
        .text-coral { color:#FF7F50 }
        .focus\:border-coral:focus { border-color:#FF7F50 }
        .no-scrollbar::-webkit-scrollbar { display:none }
        .no-scrollbar { -ms-overflow-style:none; scrollbar-width:none }
    </style>
</head>
<body class="bg-gray-100 h-screen w-full flex justify-center overflow-hidden font-sans">
<div class="w-full max-w-md h-full bg-white shadow-2xl flex flex-col">

    <div id="auth-gate" class="flex-1 flex flex-col items-center justify-center p-8">
        <div class="w-16 h-16 bg-coral rounded-2xl flex items-center justify-center mb-4 shadow-lg">
            <i class="fas fa-lock text-white text-2xl"></i>
        </div>
        <h2 class="font-bold text-gray-900 text-xl mb-1">Admin Panel</h2>
        <p class="text-xs text-gray-400 mb-6">Kivu Food</p>
        <input id="admin-password" type="password" placeholder="Enter admin password"
               class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm outline-none transition mb-3">
        <p id="auth-error" class="hidden text-red-500 text-xs mb-3 font-medium text-center"></p>
        <button onclick="checkPassword()"
                class="w-full bg-coral text-white font-bold py-3 rounded-xl active:scale-95 transition text-sm">
            Enter
        </button>
    </div>

    <div id="admin-panel" class="hidden flex-1 flex flex-col overflow-hidden">

        <div class="bg-coral text-white pt-10 pb-4 px-4 shrink-0">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="font-bold text-lg leading-none">Kivu Food Admin</h1>
                    <p class="text-[10px] text-white/70 mt-0.5">Applications · Restaurants · VIP</p>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="window._reload()" class="bg-white/20 text-white w-8 h-8 rounded-full flex items-center justify-center active:scale-95 transition">
                        <i class="fas fa-sync-alt text-sm"></i>
                    </button>
                    <button onclick="logout()" class="bg-white/20 text-white text-xs font-bold px-3 py-1.5 rounded-full active:scale-95 transition">
                        Logout
                    </button>
                </div>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-4 no-scrollbar">
            <div id="admin-list"></div>
        </div>

    </div>
</div>

<script type="module">
    import { loadAll, approveApplication, rejectApplication, toggleVIP, toggleOpen } from '/js/food/admin.js';

    const ADMIN_PASSWORD = 'kivu2024';

    window.checkPassword = () => {
        const pw  = document.getElementById('admin-password').value;
        const err = document.getElementById('auth-error');
        if (pw === ADMIN_PASSWORD) {
            document.getElementById('auth-gate').classList.add('hidden');
            document.getElementById('admin-panel').classList.remove('hidden');
            loadAll();
        } else {
            err.textContent = 'Incorrect password.';
            err.classList.remove('hidden');
        }
    };

    window.logout = () => {
        document.getElementById('auth-gate').classList.remove('hidden');
        document.getElementById('admin-panel').classList.add('hidden');
        document.getElementById('admin-password').value = '';
    };

    window._reload     = loadAll;
    window._approve    = approveApplication;
    window._reject     = rejectApplication;
    window._toggleVIP  = toggleVIP;
    window._toggleOpen = toggleOpen;

    document.getElementById('admin-password').addEventListener('keydown', e => {
        if (e.key === 'Enter') window.checkPassword();
    });
</script>
</body>
</html>
