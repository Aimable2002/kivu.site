<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Saloon Admin — Kivu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar{display:none}.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
    </style>
</head>
<body class="bg-gray-100 h-screen w-full flex justify-center overflow-hidden font-sans">
<div class="w-full max-w-md h-full bg-white shadow-2xl flex flex-col">

    <!-- Login screen -->
    <div id="login-screen" class="flex-1 flex flex-col items-center justify-center p-8">
        <div class="w-16 h-16 rounded-2xl flex items-center justify-center mb-4 text-white text-2xl" style="background:#7C3AED">✂️</div>
        <h1 class="font-black text-xl text-gray-900 mb-1">Saloon Admin</h1>
        <p class="text-xs text-gray-400 mb-6">Enter password to continue</p>
        <input id="pw-input" type="password" placeholder="Password"
               class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm outline-none mb-3 text-center">
        <div id="pw-msg" class="hidden text-red-500 text-xs font-bold mb-2"></div>
        <button onclick="checkPassword()" class="w-full text-white font-bold py-3 rounded-xl text-sm" style="background:#7C3AED">Enter</button>
    </div>

    <!-- Admin panel -->
    <div id="admin-panel" class="hidden flex-1 flex flex-col overflow-hidden">

        <div class="text-white pt-10 pb-4 px-4 shrink-0 flex items-center justify-between" style="background:#7C3AED">
            <div>
                <h1 class="font-black text-lg leading-none">✂️ Saloon Admin</h1>
                <p class="text-[10px] text-white/70 mt-0.5">Manage saloons & applications</p>
            </div>
            <a href="/" class="bg-white/20 text-white text-xs font-bold px-3 py-1.5 rounded-full">← Home</a>
        </div>

        <div class="flex-1 overflow-y-auto no-scrollbar px-4 pt-4 pb-8 space-y-6">

            <!-- Pending Applications -->
            <div>
                <p class="text-[10px] font-black tracking-widest text-gray-400 uppercase mb-3">Pending Applications</p>
                <div id="applications-list">
                    <p class="text-xs text-gray-400 italic text-center py-4">Loading...</p>
                </div>
            </div>

            <!-- Live Saloons -->
            <div>
                <p class="text-[10px] font-black tracking-widest text-gray-400 uppercase mb-3">Live Saloons</p>
                <div id="saloons-list">
                    <p class="text-xs text-gray-400 italic text-center py-4">Loading...</p>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
const ADMIN_PASSWORD = 'kivu2024';

function checkPassword() {
    const pw = document.getElementById('pw-input').value;
    if (pw === ADMIN_PASSWORD) {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('admin-panel').classList.remove('hidden');
        loadAll();
    } else {
        const msg = document.getElementById('pw-msg');
        msg.textContent = 'Wrong password.';
        msg.classList.remove('hidden');
    }
}
document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkPassword(); });

async function loadAll() {
    await Promise.all([loadApplications(), loadSaloons()]);
}

async function loadApplications() {
    const res  = await fetch('/api/admin/saloon-applications');
    const data = await res.json();
    const el   = document.getElementById('applications-list');
    const pending = (data || []).filter(a => a.status === 'pending');
    if (!pending.length) { el.innerHTML = '<p class="text-xs text-gray-400 italic text-center py-4">No pending applications.</p>'; return; }
    el.innerHTML = pending.map(a => `
    <div id="app-${a.id}" class="bg-gray-50 border border-gray-100 rounded-2xl p-4 mb-3">
        <div class="flex justify-between items-start mb-2">
            <div>
                <h3 class="font-bold text-gray-900 text-sm">${a.name}</h3>
                <p class="text-[10px] text-gray-400">${a.category} · ${a.phone}</p>
                ${a.address ? `<p class="text-[10px] text-gray-400 mt-0.5"><i class="fas fa-map-marker-alt mr-1"></i>${a.address}</p>` : ''}
                ${a.hours ? `<p class="text-[10px] text-gray-400"><i class="fas fa-clock mr-1"></i>${a.hours}</p>` : ''}
            </div>
            <span class="text-[9px] font-bold bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded">Pending</span>
        </div>
        ${a.description ? `<p class="text-xs text-gray-500 mb-2">${a.description}</p>` : ''}
        ${a.menu_data?.length ? `<p class="text-[10px] text-violet-600 font-bold mb-2">✂️ ${a.menu_data.reduce((t,c)=>t+(c.items?.length||0),0)} services in ${a.menu_data.length} categories</p>` : ''}
        ${a.staff_data?.length ? `<p class="text-[10px] text-gray-500 mb-2">👤 ${a.staff_data.length} staff members</p>` : ''}
        <div class="flex gap-2 mt-3">
            <button onclick="approveApp('${a.id}')"
                    class="flex-1 bg-green-500 text-white text-xs font-bold py-2 rounded-xl active:scale-95 transition">
                ✓ Approve
            </button>
            <button onclick="rejectApp('${a.id}')"
                    class="flex-1 bg-red-100 text-red-500 text-xs font-bold py-2 rounded-xl active:scale-95 transition">
                ✗ Reject
            </button>
        </div>
    </div>`).join('');
}

async function loadSaloons() {
    const res  = await fetch('/api/admin/saloons');
    const data = await res.json();
    const el   = document.getElementById('saloons-list');
    if (!data?.length) { el.innerHTML = '<p class="text-xs text-gray-400 italic text-center py-4">No live saloons yet.</p>'; return; }
    el.innerHTML = data.map(s => `
    <div id="sal-${s.id}" class="bg-white border border-gray-100 rounded-2xl p-4 mb-3 shadow-sm">
        <div class="flex justify-between items-start mb-3">
            <div>
                <h3 class="font-bold text-gray-900 text-sm">${s.name}</h3>
                <p class="text-[10px] text-gray-400">${s.category} · ${s.phone || '—'}</p>
                ${s.address ? `<p class="text-[10px] text-gray-400 mt-0.5"><i class="fas fa-map-marker-alt mr-1"></i>${s.address}</p>` : ''}
            </div>
            ${s.is_vip ? '<span class="text-[9px] font-bold bg-yellow-100 text-yellow-600 px-2 py-0.5 rounded">⭐ VIP</span>' : ''}
        </div>
        <div class="flex gap-2">
            <button onclick="toggleVip('${s.id}', this)"
                    class="flex-1 ${s.is_vip ? 'bg-yellow-100 text-yellow-700' : 'bg-gray-100 text-gray-600'} text-xs font-bold py-2 rounded-xl active:scale-95 transition">
                ⭐ ${s.is_vip ? 'Remove VIP' : 'Set VIP'}
            </button>
            <button onclick="toggleOpen('${s.id}', this)"
                    class="flex-1 ${s.is_open ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'} text-xs font-bold py-2 rounded-xl active:scale-95 transition">
                ${s.is_open ? '🟢 Open' : '⚫ Closed'}
            </button>
        </div>
    </div>`).join('');
}

async function approveApp(id) {
    const btn = document.querySelector(`#app-${id} button`);
    if (btn) btn.textContent = 'Approving...';
    await fetch(`/api/admin/saloon-applications/${id}/approve`, { method: 'POST' });
    document.getElementById('app-' + id)?.remove();
    loadSaloons();
}

async function rejectApp(id) {
    await fetch(`/api/admin/saloon-applications/${id}/reject`, { method: 'POST' });
    document.getElementById('app-' + id)?.remove();
}

async function toggleVip(id, btn) {
    await fetch(`/api/admin/saloons/${id}/vip`, { method: 'POST' });
    const isVip = btn.textContent.includes('Remove');
    btn.textContent = isVip ? '⭐ Set VIP' : '⭐ Remove VIP';
    btn.className = isVip ? 'flex-1 bg-gray-100 text-gray-600 text-xs font-bold py-2 rounded-xl active:scale-95 transition'
                          : 'flex-1 bg-yellow-100 text-yellow-700 text-xs font-bold py-2 rounded-xl active:scale-95 transition';
}

async function toggleOpen(id, btn) {
    await fetch(`/api/admin/saloons/${id}/open`, { method: 'POST' });
    const isOpen = btn.textContent.includes('Open');
    btn.textContent = isOpen ? '⚫ Closed' : '🟢 Open';
    btn.className = isOpen ? 'flex-1 bg-gray-100 text-gray-500 text-xs font-bold py-2 rounded-xl active:scale-95 transition'
                           : 'flex-1 bg-green-100 text-green-700 text-xs font-bold py-2 rounded-xl active:scale-95 transition';
}
</script>
</body>
</html>
